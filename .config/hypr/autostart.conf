exec-once = qs -c noctalia-shell
# exec-once = /home/jab/.config/hypr/portals.sh
exec-once = hypridle &
exec-once = hyprshade on vibrance

exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = /usr/bin/gnome-keyring-daemon --start --components=secrets &

exec-once = wl-paste --type text --watch cliphist store # Stores only text data
exec-once = wl-paste --type image --watch cliphist store # Stores only image data
# exec-once = wl-clip-persist --clipboard regular

# Update systemd and dbus env variables (Crucial for portals)
# 1. Force the env variables into the session
exec-once = dbus-update-activation-environment --systemd --all
# 2. Use 'gentle' restarts for the portals
exec-once = systemctl --user restart xdg-desktop-portal-hyprland
exec-once = systemctl --user restart xdg-desktop-portal
# Hyprland usually starts XDPH automatically, but you can force it via systemd:
exec-once = systemctl --user start xdg-desktop-portal-hyprland

exec-once = hyprctl setcursor Bibata-Modern-Ice 32

