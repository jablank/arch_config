exec-once = qs -c noctalia-shell
exec-once = /home/jab/.config/hypr/portals.sh
exec-once = hypridle &
exec-once = hyprshade on vibrance
exec-once = hyprctl plugin load /var/cache/hyprpm/jab/Hyprspace/Hyprspace.so


misc {
    disable_hyprland_guiutils_check = true
}

# exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = /usr/bin/gnome-keyring-daemon --start --components=secrets &

exec-once = wl-paste --type text --watch cliphist store # Stores only text data
exec-once = wl-paste --type image --watch cliphist store # Stores only image data
# exec-once = wl-clip-persist --clipboard regular

# makes sure hyprportal is prioritized
exec-once = killall -q xdg-desktop-portal-hyprland; killall -q xdg-desktop-portal; /usr/lib/xdg-desktop-portal-hyprland & /usr/lib/xdg-desktop-portal
# exec-once = swaybg -i /home/jab/Pictures/macos_mountainlion.jpg

exec-once = hyprctl setcursor Bibata-Modern-Ice 32
