# GTK Portal
windowrule {
    name = portal-fix
    match:class = ^(xdg-desktop-portal-gtk)$
    match:title = ^(All Files)$
    float = on
}

# force full opacity, 1 way

windowrule = match:class ^mpv$, opacity 1.0 override 1.0 override 1.0 override

windowrule {
    name = brave opacity
    match:class = ^(brave-browser)$
    opaque = on
}


# Swayimg
windowrule {
    name = swayimg-float
    match:class = ^(swayimg)$
    float = on
}


windowrule {
    # Ignore maximize requests from all apps. 
    name = suppress-maximize-events
    match:class = .*
    suppress_event = maximize
}

# XWayland Dragging Fix
windowrule {
    name = xwayland-drag-fix
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false
    no_focus = on
}

