#############################
### ENVIRONMENT VARIABLES ###
#############################



# Critical for Firefox on NVIDIA/Wayland

env = MOZ_DISABLE_RDD_SANDBOX,1
env = LIBVA_DRIVER_NAME,nvidia
env = NVD_BACKEND,direct



env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland

# Define the full path manually to avoid the recursion error
env = XDG_DATA_DIRS,$HOME/.local/share/flatpak/exports/share:/var/lib/flatpak/exports/share:/usr/local/share:/usr/share

env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland

env = HYPRCURSOR_THEME,Bibata-Modern-Ice
env = HYPRCURSOR_SIZE,32
env = XCURSOR_THEME,Bibata-Modern-Ice
env = XCURSOR_SIZE,32

#https://wiki.archlinux.org/title/Dark_mode_switching
#env = QT_QPA_PLATFORMTHEME,gtk3
env = QT_QPA_PLATFORMTHEME,qt6ct


###################
### PERMISSIONS ###
###################

# See https://wiki.hypr.land/Configuring/Permissions/
# Please note permission changes here require a Hyprland restart and are not applied on-the-fly
# for security reasons

 ecosystem {
   enforce_permissions = 1
 }

permission = /usr/(bin|local/bin)/grim, screencopy, allow
permission = /usr/(lib|libexec|lib64)/xdg-desktop-portal-hyprland, screencopy, allow
permission = /usr/(bin|local/bin)/hyprlock, screencopy, allow

# permission = /usr/(bin|local/bin)/hyprpm, plugin, allow

#############
### INPUT ###
#############

# https://wiki.hypr.land/Configuring/Variables/#input
input {
    kb_layout = us, ru
    kb_variant =
    kb_model =
    kb_options = grp:win_space_toggle 
    kb_rules =
    follow_mouse = 1
    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.
    touchpad {
        natural_scroll = false
    }
}

device {
    name = gamesir-tegenaria-lite-keyboard
    enabled = false
}

device {
    name = gamesir-tegenaria-lite-mouse
    enabled = false
}
dwindle {
    pseudotile = true
    preserve_split = true # You probably want this
}
master {
    new_status = master
}

plugin:hyprglass {
    default_theme = dark
    default_preset = default

    brightness = 0.9                 # global override
    dark:brightness = 0.82           # built-in dark theme override
    light:adaptive_boost = 0.5       # built-in light theme override

    # Custom preset: shared + per-theme variants
    preset = name:clear, glass_opacity:0.8, blur_strength:1.5
    preset = name:clear:dark, brightness:0.7
    preset = name:clear:light, brightness:1.2
}
