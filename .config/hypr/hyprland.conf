monitor=HDMI-A-2,disable
monitor=HDMI-A-1,2560x1440@59.95Hz,auto,auto

source = ~/.config/hypr/auto_environment
source = ~/.config/hypr/ruleswindows.conf 

# 
# k3ybindngs + keywords
# visual variables
#

###################
###             ###
###################

# See https://wiki.hypr.land/Configuring/Keywords/

$browser = /home/jab/AppImages/helium.appimage
$terminal = foot
$fileManager = thunar
$launcher = /home/jab/.config/rofi/launchers/type-3/launcher.sh

# https://github.com/adi1090x/rofi?tab=readme-ov-file

###################
# HOTKEYBINDINGS  #
###################
$mainMod = SUPER # Sets winkey
bind = $mainMod SHIFT, M, exit,
bind = $mainMod, L, exec, hyprlock
bind = $mainMod, Q, killactive,
bind = $mainMod, F, fullscreen

bind = $mainMod SHIFT, R, exec, pkill waybar && exec waybar &

bind = $mainMod, E, exec, $fileManager
bind = $mainMod, 4, exec, $browser
bind = $mainMod, T, exec, $terminal
bind = $mainMod SHIFT, T, exec, [float;size 30% 35%;center] foot
bind = $mainMod, R, exec, $launcher

# replaces togglefloating with autoresizing
bind = $mainMod, G, exec, /home/jab/.config/hypr/smart_floater.sh
bind = $mainMod, Tab, cyclenext, tiled
bind = $mainMod, Space, cyclenext, floating

bind = $mainMod, 6, exec, hyprpicker -f hex
bind = $mainMod SHIFT, S, exec, sh -c 'slurp | grim -g - /home/jab/Pictures/Screenshots/$(date +%Y%m%d_%H%M).png'

# bind = $mainMod, V, exec, 
# bind = $mainMod, N, exec, 
# bind = $mainMod, I, exec,
# bind = $mainMod SHIFT, W, exec, 
# bind = $mainMod, 1, exec,
# bind = $mainMod, 2, exec, 

# Move focus with mainMod + arrow keys
bind = $mainMod, a, movefocus, l
bind = $mainMod, d, movefocus, r
bind = $mainMod, w, movefocus, u
bind = $mainMod, s, movefocus, d
bind = $mainMod, Z, workspace, 1
bind = $mainMod, X, workspace, 2
bind = $mainMod, C, workspace, 3
bind = $mainMod, V, workspace, 4
bind = $mainMod SHIFT, Z, movetoworkspace, 1
bind = $mainMod SHIFT, X, movetoworkspace, 2
bind = $mainMod SHIFT, C, movetoworkspace, 3
bind = $mainMod SHIFT, V, movetoworkspace, 4
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous


#####################
###    looks ++   ###
#####################

# Refer to https://wiki.hypr.land/Configuring/Variables/

# https://wiki.hypr.land/Configuring/Variables/#general
general {
    gaps_in = 5
    gaps_out = 10
    border_size = 3
    col.active_border = rgba(37f4999a)
    col.inactive_border = rgba(595959aa)
    resize_on_border = false
    allow_tearing = false
    layout = dwindle
}

# https://wiki.hypr.land/Configuring/Variables/#decoration
decoration {
    rounding = 0
    rounding_power = 2
    # Change transparency of focused and unfocused windows
    active_opacity = 1.0
    inactive_opacity = 1.0
 blur {
        enabled = false
      }
 shadow {
        enabled = false
  #      range = 4
  #      render_power = 3
  #      color = rgba(1a1a1aee)
        }
}

# window rules for blur zmay cause render issue
# windowrulev2 = noblur, class:^(.*)$

# ----------------------------------------------------- 
# fade animation only
# ----------------------------------------------------- 
animations {
    enabled = true

    # 1. Disable all standard window/border animations
    animation = windows, 0
    animation = windowsIn, 0
    animation = windowsOut, 0
    animation = windowsMove, 0
    animation = border, 0

    animation = workspaces, 1, 5, default, fade
}
