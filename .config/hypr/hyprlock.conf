# Minimalist hyprlock config (2560x1440 centered)

# --- Background: Solid Black ---
background {
    monitor =
    color = rgb(000000)
    blur_passes = 0
}

# --- Label: "poop" ---
label {
    monitor =
    text = **:) locked** # Only the requested message
    color = rgba(ffffff40)
    font_size = 23
    font_family = Ubuntu Mono Nerd Font Mono
    
    # Centering and offset
    halign = center
    valign = center
    position = 0, -80 # Centers horizontally, moves up 80px
}

# --- Input Field: Centered ---
input-field {
    monitor =
    size = 400, 50
    
    # Appearance
    outer_color = rgb(202020)
    inner_color = rgb(101010)
    font_color = rgb(ffffff)
    placeholder_text =
    rounding = -1
    
    # Centering
    halign = center
    valign = center
    position = 0, 0 # Centers horizontally, centers vertically
    
    # Error feedback
    fail_color = rgb(ff0000)
}
