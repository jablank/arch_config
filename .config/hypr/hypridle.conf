# Hypridle Configuration: 15min lock, 17min DPMS off

# ===============================================
# GENERAL SETTINGS
# ===============================================
general {
    # Define the command hypridle should use to lock the screen.
    # This prevents multiple hyprlock instances from starting.
    # This command is triggered by 'loginctl lock-session' below.
    lock_cmd = pidof hyprlock || hyprlock 
    
    # Optional: Configure commands to run before/after suspension/sleep,
    # but for just locking/DPMS, these are not strictly necessary.
    # For safety/completeness, you can uncomment these if you plan to suspend later.
    before_sleep_cmd = loginctl lock-session
    after_sleep_cmd = hyprctl dispatch dpms on 
}

# ===============================================
# LISTENER 1: LOCK SCREEN (15 MINUTES)
# ===============================================
listener {
    # 15 minutes = 900 seconds
    timeout = 900
    
    # Action: Lock the session using the 'lock_cmd' defined in the general section.
    on-timeout = loginctl lock-session
    
    # No 'on-resume' needed here, as activity will stop the timer and the screen is already on.
}

# ===============================================
# LISTENER 2: TURN OFF DISPLAY (17 MINUTES TOTAL)
# ===============================================
listener {
    # 17 minutes = 1020 seconds. This listener fires 2 minutes *after* the screen locks.
    timeout = 1020
    
    # Action: Turn OFF DPMS (Display Power Management Signaling) 
    # for your specified monitor to make it black.
    on-timeout = hyprctl dispatch dpms off HDMI-A-1
    
    # Action: Turn ON DPMS when activity is detected (mouse move/keypress) 
    # while the screen is off.
    on-resume = hyprctl dispatch dpms on HDMI-A-1
}

# ===============================================
# IMPORTANT: STARTING HYPRIDLE
# ===============================================
# Ensure you have 'exec-once = hypridle' in your ~/.config/hypr/hyprland.conf
# so the daemon starts when Hyprland launches.
